<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMIÈRE | Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Internal Admin-Specific Styles */
        .admin-main { padding: 120px 8% 50px; min-height: 100vh; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .stat-card h3 { color: var(--text-gray); font-size: 0.9rem; margin-bottom: 10px; }
        .stat-card p { font-size: 1.8rem; font-weight: 700; color: var(--accent); }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 25px;
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--accent);
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-gray); }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: #0f0f0f;
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 10px;
        }

        .admin-table-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            overflow-x: auto;
            border: 1px solid var(--glass-border);
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { color: var(--accent); padding: 15px; border-bottom: 1px solid var(--glass-border); }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .prod-img-sm { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        
        .action-btns { display: flex; gap: 10px; }
        .btn-edit { color: #4dadff; cursor: pointer; background: none; border: none; }
        .btn-delete { color: #ff4d4d; cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">LUMI<span class="accent-text">ÈRE</span> <small style="font-size: 10px; opacity: 0.6;">ADMIN</small></div>
        <div class="nav-icons">
            <a href="index.html" class="btn-secondary">View Site</a>
            <button class="btn-primary" onclick="toggleModal(true)">+ Add Product</button>
        </div>
    </nav>

    <main class="admin-main">
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Products</h3>
                <p id="total-prods">0</p>
            </div>
            <div class="stat-card">
                <h3>Active Orders</h3>
                <p id="total-orders">12</p>
            </div>
            <div class="stat-card">
                <h3>Revenue</h3>
                <p>$4,250</p>
            </div>
        </div>

        <div class="admin-table-container">
            <h2 style="margin-bottom: 20px;">Inventory Management</h2>
            <table>
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-product-list">
                    </tbody>
            </table>
        </div>
    </main>

    <div class="modal-overlay" id="productModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 25px;">Add New <span class="accent-text">Delicacy</span></h2>
            <form id="add-product-form">
                <div class="form-group">
                    <label>Product Title</label>
                    <input type="text" id="p-title" placeholder="e.g. Truffle Pizza" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="p-category">
                        <option value="Pizza">Pizza</option>
                        <option value="Burger">Burger</option>
                        <option value="Biryani">Biryani</option>
                        <option value="Dessert">Dessert</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="p-price" placeholder="19.99" step="0.01" required>
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="p-image" placeholder="https://image-link.com" required>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="submit" class="btn-primary" style="flex: 1;">Save Product</button>
                    <button type="button" class="btn-secondary" onclick="toggleModal(false)" style="flex: 1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Modal Toggle
        function toggleModal(show) {
            document.getElementById('productModal').style.display = show ? 'flex' : 'none';
        }

        // Handle Form Submission
        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newProduct = {
                title: document.getElementById('p-title').value,
                category: document.getElementById('p-category').value,
                price: document.getElementById('p-price').value,
                image: document.getElementById('p-image').value
            };

            // API CALL (You need your backend running)
            try {
                const res = await fetch('http://localhost:5000/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newProduct)
                });
                if(res.ok) {
                    alert("Product added successfully!");
                    location.reload();
                }
            } catch (err) {
                console.error("Error adding product", err);
            }
        });

        // Load Products into Table
        async function loadAdminProducts() {
            try {
                const res = await fetch('http://localhost:5000/api/products');
                const products = await res.json();
                
                document.getElementById('total-prods').innerText = products.length;
                const tbody = document.getElementById('admin-product-list');
                
                tbody.innerHTML = products.map(p => `
                    <tr>
                        <td><img src="${p.image}" class="prod-img-sm"></td>
                        <td>${p.title}</td>
                        <td>${p.category}</td>
                        <td>$${p.price}</td>
                        <td class="action-btns">
                            <button class="btn-edit"><i data-lucide="edit-3"></i></button>
                            <button class="btn-delete" onclick="deleteProduct('${p._id}')"><i data-lucide="trash-2"></i></button>
                        </td>
                    </tr>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                console.log("Connect your backend to see live data.");
            }
        }

        async function deleteProduct(id) {
            if(confirm("Are you sure?")) {
                await fetch(`http://localhost:5000/api/products/${id}`, { method: 'DELETE' });
                location.reload();
            }
        }

        window.onload = loadAdminProducts;
    </script>
</body>
</html>
